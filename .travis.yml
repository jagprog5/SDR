language: cpp
dist: bionic

branches:
  only:
    - main
    - travis_testing

git:
  depth: 1

jobs:
  include:
    - name: "g++ & code cov"
      before_install:
        # next line should be removed once boost ubuntu package catches up
        - sudo add-apt-repository -y ppa:mhier/libboost-latest
        - sudo apt-get update
      install:
        - sudo apt-get install libboost1.73-dev # see previous comment
        # - sudo apt-get install -y libboost-test-dev
        - sudo apt-get install -y lcov # line coverage
        - sudo apt-get install -y g++-10 # c++20 features
      before_script:
        - cd ${TRAVIS_BUILD_DIR} && cd build
        - cmake .. -DBUILD_TESTING=true -DCODE_COVERAGE=true -DCMAKE_C_COMPILER=/usr/bin/gcc-10 -DCMAKE_CXX_COMPILER=/usr/bin/g++-10
        - cmake --build .
      script:
        - cd ${TRAVIS_BUILD_DIR} && cd build
        - ctest
      after_script:
        - cd ${TRAVIS_BUILD_DIR} && cd build
        - make cov-proc && bash <(curl -s https://codecov.io/bash) -f coverage.info

    - name: "clang++"
      before_install:
        # next line should be removed once boost ubuntu package catches up
        - sudo add-apt-repository -y ppa:mhier/libboost-latest
        - sudo apt-get update
      install:
        - sudo apt-get install libboost1.73-dev # see previous comment
        # - sudo apt-get install -y libboost-test-dev
        - sudo apt-get install -y    # c++ 20 features
        # clang++ relies on g++'s headers (for some strange reason)
        - sudo apt-get install -y g++-10
      before_script:
        - cd ${TRAVIS_BUILD_DIR} && cd build
        - cmake .. -DBUILD_TESTING=true -DCMAKE_C_COMPILER=/usr/bin/clang-10 -DCMAKE_CXX_COMPILER=/usr/bin/clang++-10
        - cmake --build .
      script:
        - cd ${TRAVIS_BUILD_DIR} && cd build
        - ctest